<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iteration 5 Frontend</title>
</head>
<body>
    <h1>Store System – Iteration 5</h1>

    <!-- 1. View Products -->
    <section>
        <h2>Products</h2>
        <button id="loadProductsBtn">Load Products</button>
        <div id="productsContainer"></div>
    </section>

    <hr>

    <!-- 2. View Orders -->
    <section>
        <h2>Orders</h2>
        <button id="loadOrdersBtn">Load Orders</button>
        <div id="ordersContainer"></div>
    </section>

    <hr>

    <!-- 3. View Order Details -->
    <section>
        <h2>Order Details</h2>
        <input type="number" id="orderIdInput" placeholder="Order ID">
        <button id="viewOrderBtn">View Order</button>
        <div id="orderDetailsContainer"></div>
    </section>

    <hr>

    <!-- 4. Create Order -->
    <section>
        <h2>Create Order</h2>
        <p>Format: <code>1,2;2,1</code> → product 1 qty 2, product 2 qty 1</p>
        <input type="text" id="orderItemsInput" placeholder="1,2;2,1">
        <button id="createOrderBtn">Create Order</button>
        <div id="createOrderResult"></div>
    </section>

    <hr>

    <!-- 5. Create Product -->
    <section>
        <h2>Create Product</h2>
        <input type="number" id="productIdInput" placeholder="ID">
        <input type="text" id="productNameInput" placeholder="Name">
        <input type="number" step="0.01" id="productPriceInput" placeholder="Price">
        <button id="createProductBtn">Create Product</button>
        <div id="createProductResult"></div>
    </section>

    <script>
        const baseUrl = 'http://localhost:5000';

        // 1. Load Products
        document.getElementById('loadProductsBtn').addEventListener('click', () => {
            fetch(`${baseUrl}/products`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('productsContainer');
                    container.innerHTML = '';
                    const ul = document.createElement('ul');
                    data.forEach(p => {
                        const li = document.createElement('li');
                        li.textContent = `ID: ${p.id} | ${p.name} | $${p.price}`;
                        ul.appendChild(li);
                    });
                    container.appendChild(ul);
                });
        });

        // 2. Load Orders
        document.getElementById('loadOrdersBtn').addEventListener('click', () => {
            fetch(`${baseUrl}/orders`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('ordersContainer');
                    container.innerHTML = '';
                    const ul = document.createElement('ul');
                    data.forEach(o => {
                        const li = document.createElement('li');
                        li.textContent = `Order ID: ${o.id}`;
                        ul.appendChild(li);
                    });
                    container.appendChild(ul);
                });
        });

        // 3. View Order Details
        document.getElementById('viewOrderBtn').addEventListener('click', () => {
            const orderId = document.getElementById('orderIdInput').value;
            if (!orderId) return;

            fetch(`${baseUrl}/orders/${orderId}`)
                .then(r => {
                    if (!r.ok) throw new Error('Order not found');
                    return r.json();
                })
                .then(order => {
                    const container = document.getElementById('orderDetailsContainer');
                    container.innerHTML = '';

                    const header = document.createElement('p');
                    header.textContent = `Order ID: ${order.id} | Total: $${order.total}`;
                    container.appendChild(header);

                    const ul = document.createElement('ul');
                    order.items.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = `Product ID: ${item.product_id} | Qty: ${item.qty}`;
                        ul.appendChild(li);
                    });
                    container.appendChild(ul);
                })
                .catch(() => {
                    document.getElementById('orderDetailsContainer').innerText = 'Order not found.';
                });
        });

        // Helper: parse "1,2;2,1"
        function parseOrderInput(str) {
            return str.split(';').map(pair => {
                const [id, qty] = pair.split(',');
                return { id: parseInt(id), qty: parseInt(qty) };
            });
        }

        // 4. Create Order
        document.getElementById('createOrderBtn').addEventListener('click', () => {
            const raw = document.getElementById('orderItemsInput').value;
            const items = parseOrderInput(raw);

            fetch(`${baseUrl}/enter_orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(items)
            })
                .then(r => r.json())
                .then(data => {
                    document.getElementById('createOrderResult').innerText =
                        `Order created with ID: ${data.id}`;
                })
                .catch(() => {
                    document.getElementById('createOrderResult').innerText =
                        'Error creating order.';
                });
        });

        // 5. Create Product
        document.getElementById('createProductBtn').addEventListener('click', () => {
            const id = parseInt(document.getElementById('productIdInput').value);

            const price = parseFloat(document.getElementById('productPriceInput').value);
